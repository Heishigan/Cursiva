# cloudbuild.yaml — Google Cloud Build CI/CD pipeline for the Cursiva backend
#
# Triggers on every push to `main` that touches files under:
#   - backend/**
#   - cloudbuild.yaml
#
# Required Cloud Build service account permissions:
#   - roles/run.admin
#   - roles/iam.serviceAccountUser
#   - roles/artifactregistry.writer

substitutions:
  _REGION: europe-north1
  _SERVICE: cursiva-backend
  _REPO: cursiva-backend
  _IMAGE: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

timeout: 1800s  # 30-minute hard cap for the entire pipeline

steps:
  # ── Step 1: Pull the previous image to use as a layer cache ───────────────
  # Allows Docker to reuse unchanged layers (e.g. apt packages, pip deps),
  # dramatically reducing build times after the first run.
  - id: pull-cache
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker pull ${_IMAGE}:latest || echo "No cache image found, building from scratch."
    timeout: 120s

  # ── Step 2: Build the Docker image ────────────────────────────────────────
  - id: build
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - '${_IMAGE}:latest'
      - '-t'
      - '${_IMAGE}:$COMMIT_SHA'
      - '-t'
      - '${_IMAGE}:latest'
      - '--label'
      - 'commit=$COMMIT_SHA'
      - '--label'
      - 'build=$BUILD_ID'
      - './backend'
    timeout: 1500s
    waitFor: ['pull-cache']

  # ── Step 3: Push both tags to Artifact Registry ───────────────────────────
  - id: push
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE}'
    timeout: 300s
    waitFor: ['build']

  # ── Step 4: Deploy to Cloud Run ───────────────────────────────────────────
  # Uses the immutable commit-SHA tag (not :latest) so every deployment is
  # fully traceable and rollbacks are a single gcloud command.
  - id: deploy
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_IMAGE}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--quiet'
    timeout: 300s
    waitFor: ['push']

  # ── Step 5: Smoke-test — verify the service is healthy after deploy ────────
  - id: health-check
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe ${_SERVICE} \
          --region ${_REGION} \
          --format 'value(status.url)')
        echo "Smoke-testing $$SERVICE_URL..."
        HTTP_CODE=$$(curl --silent --output /dev/null --write-out "%{http_code}" "$$SERVICE_URL/")
        if [ "$$HTTP_CODE" -ne 200 ]; then
          echo "Health check failed! HTTP $$HTTP_CODE"
          exit 1
        fi
        echo "Health check passed (HTTP $$HTTP_CODE)."
    timeout: 60s
    waitFor: ['deploy']

images:
  - '${_IMAGE}:$COMMIT_SHA'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # Faster builds — LaTeX install is CPU-intensive
